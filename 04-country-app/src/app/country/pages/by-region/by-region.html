
<h1 class="text-2xl">Por región</h1>
<h3 class="text-lg">Selecciones una región</h3>

<section class="row mt-2">
  <div class="flex gap-2">
    @for (region of regions; track $index) {
        <button class="btn btn-outline" (click)="setTableRegion(region)" [class.btn-primary] ="selectedRegion() === region">{{ region }}</button>
    }
  </div>
</section>


<country-list 
    [countries]="countryResource.value() ?? []"
    [errorMessage]="countryResource.error()"
    [isEmpty]="countryResource.value()?.length === 0"
    [isLoading]="countryResource.isLoading()"
/>
